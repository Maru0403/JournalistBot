# ─────────────────────────────────────────────────────────────────────────────
# NOTIFICATION SERVICE
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: journalist-bot
  labels:
    app: notification-service
spec:
  replicas: 2   # HA — 2 pod minimum; HPA scale lên 5
  selector:
    matchLabels:
      app: notification-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: notification-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8083"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: wait-for-postgres-notification
          image: busybox:1.35
          command: ['sh', '-c',
            'until nc -z postgres-notification 5432; do echo "Waiting for postgres-notification..."; sleep 3; done']
        - name: wait-for-mongodb
          image: busybox:1.35
          command: ['sh', '-c',
            'until nc -z journalist-mongodb 27017; do echo "Waiting for MongoDB..."; sleep 3; done']
        - name: wait-for-redis
          image: busybox:1.35
          command: ['sh', '-c',
            'until nc -z journalist-redis 6379; do echo "Waiting for Redis..."; sleep 3; done']
      containers:
        - name: notification-service
          image: ghcr.io/maru0403/journalistbot-notification:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: notification-service-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: journalist-bot-secrets
                  key: POSTGRES_PASSWORD
            - name: DISCORD_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: journalist-bot-secrets
                  key: DISCORD_BOT_TOKEN
            - name: DISCORD_NEWS_CHANNEL_ID
              valueFrom:
                secretKeyRef:
                  name: journalist-bot-secrets
                  key: DISCORD_NEWS_CHANNEL_ID
                  optional: true
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: journalist-bot-secrets
                  key: TELEGRAM_BOT_TOKEN
            - name: TELEGRAM_BOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: journalist-bot-secrets
                  key: TELEGRAM_BOT_USERNAME
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:+UseVirtualThreads -XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/./urandom"
          resources:
            requests:
              cpu: "300m"
              memory: "768Mi"
            limits:
              cpu: "1500m"
              memory: "1.5Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8083
            initialDelaySeconds: 90   # Discord/Telegram init cần thời gian
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 5
            timeoutSeconds: 10
---
