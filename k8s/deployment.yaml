# ── Per-Service Deployments (Phase 6) ─────────────────────────────────────────
# Mỗi service có deployment riêng, resource riêng, probe riêng.
# Tất cả pull image từ GHCR (ghcr.io/maru0403/journalistbot-<service>:latest)

# ─────────────────────────────────────────────────────────────────────────────
# SCHEDULER SERVICE (Phase 6 — mới)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler-service
  namespace: journalist-bot
  labels:
    app: scheduler-service
spec:
  replicas: 1   # HPA sẽ scale lên 2 nếu cần; Quartz isClustered=true xử lý HA
  selector:
    matchLabels:
      app: scheduler-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: scheduler-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8084"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: wait-for-postgres-scheduler
          image: busybox:1.35
          command: ['sh', '-c',
            'until nc -z postgres-scheduler 5432; do echo "Waiting for postgres-scheduler..."; sleep 3; done']
        - name: wait-for-kafka
          image: busybox:1.35
          command: ['sh', '-c',
            'until nc -z kafka 29092; do echo "Waiting for Kafka..."; sleep 3; done']
      containers:
        - name: scheduler-service
          image: ghcr.io/maru0403/journalistbot-scheduler:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8084
          envFrom:
            - configMapRef:
                name: scheduler-service-config
          env:
            - name: POSTGRES_SCHEDULER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: journalist-bot-secrets
                  key: POSTGRES_SCHEDULER_PASSWORD
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:+UseVirtualThreads -XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/./urandom"
          resources:
            requests:
              cpu: "200m"
              memory: "384Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8084
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
---
# ─────────────────────────────────────────────────────────────────────────────
# FETCHER SERVICE (Phase 6 — không còn PostgreSQL)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fetcher-service
  namespace: journalist-bot
  labels:
    app: fetcher-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fetcher-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: fetcher-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8081"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: wait-for-redis
          image: busybox:1.35
          command: ['sh', '-c',
            'until nc -z journalist-redis 6379; do echo "Waiting for Redis..."; sleep 3; done']
        - name: wait-for-kafka
          image: busybox:1.35
          command: ['sh', '-c',
            'until nc -z kafka 29092; do echo "Waiting for Kafka..."; sleep 3; done']
      containers:
        - name: fetcher-service
          image: ghcr.io/maru0403/journalistbot-fetcher:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: fetcher-service-config
          env:
            - name: NEWS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: journalist-bot-secrets
                  key: NEWS_API_KEY
                  optional: true
            - name: REDDIT_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: journalist-bot-secrets
                  key: REDDIT_CLIENT_ID
                  optional: true
            - name: REDDIT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: journalist-bot-secrets
                  key: REDDIT_CLIENT_SECRET
                  optional: true
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:+UseVirtualThreads -XX:MaxRAMPercentage=75.0 -Djava.security.egd=file:/dev/./urandom"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 45
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
---
