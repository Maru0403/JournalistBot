apiVersion: v1
kind: Service
metadata:
  name: journalist-bot-svc
  namespace: journalist-bot
  labels:
    app: journalist-bot
spec:
  type: ClusterIP
  selector:
    app: journalist-bot
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
---
