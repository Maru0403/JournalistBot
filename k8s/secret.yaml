# ──────────────────────────────────────────────────────────────────────────────
# SECRET TEMPLATE — DO NOT COMMIT WITH REAL VALUES
# Replace <base64-encoded-value> with: echo -n "actual_value" | base64
#
# Deploy with:
#   kubectl apply -f k8s/secret.yaml -n journalist-bot
#
# Or use Sealed Secrets / External Secrets Operator for production.
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: journalist-bot-secrets
  namespace: journalist-bot
  labels:
    app: journalist-bot
type: Opaque
data:
  # PostgreSQL password
  # echo -n "your_pg_password" | base64
  POSTGRES_PASSWORD: <base64-encoded-postgres-password>

  # Discord bot token (from Discord Developer Portal)
  # echo -n "your_discord_token" | base64
  DISCORD_BOT_TOKEN: <base64-encoded-discord-token>

  # Discord news channel ID (optional — can use /start command instead)
  DISCORD_NEWS_CHANNEL_ID: <base64-encoded-channel-id>

  # Telegram bot token (from @BotFather)
  TELEGRAM_BOT_TOKEN: <base64-encoded-telegram-token>

  # Telegram bot username (without @)
  TELEGRAM_BOT_USERNAME: <base64-encoded-telegram-username>

  # Anthropic Claude API key (from console.anthropic.com)
  ANTHROPIC_API_KEY: <base64-encoded-anthropic-key>

  # Google Gemini API key (from aistudio.google.com — free tier available)
  GEMINI_API_KEY: <base64-encoded-gemini-key>

  # NewsAPI.org API key (from newsapi.org)
  NEWS_API_KEY: <base64-encoded-newsapi-key>

  # Zalo OA token (future — leave empty for now)
  # ZALO_OA_ACCESS_TOKEN: <base64-encoded-zalo-token>
