# ──────────────────────────────────────────────────────────────────────────────
# SECRET TEMPLATE — DO NOT COMMIT WITH REAL VALUES
# Replace <base64-encoded-value> with: echo -n "actual_value" | base64
#
# Deploy with:
#   kubectl apply -f k8s/secret.yaml -n journalist-bot
#
# Production: dùng External Secrets Operator + AWS Secrets Manager / Vault
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: journalist-bot-secrets
  namespace: journalist-bot
  labels:
    app: journalist-bot
type: Opaque
data:
  # ── Database passwords ─────────────────────────────────────────────────
  POSTGRES_PASSWORD: <base64-encoded-postgres-password>
  POSTGRES_SCHEDULER_PASSWORD: <base64-encoded-postgres-password>

  # ── Discord ────────────────────────────────────────────────────────────
  DISCORD_BOT_TOKEN: <base64-encoded-discord-token>
  DISCORD_NEWS_CHANNEL_ID: <base64-encoded-channel-id>

  # ── Telegram ───────────────────────────────────────────────────────────
  TELEGRAM_BOT_TOKEN: <base64-encoded-telegram-token>
  TELEGRAM_BOT_USERNAME: <base64-encoded-telegram-username>
  TELEGRAM_WEBHOOK_SECRET: <base64-encoded-webhook-secret>

  # ── AI APIs ───────────────────────────────────────────────────────────
  ANTHROPIC_API_KEY: <base64-encoded-anthropic-key>
  GEMINI_API_KEY: <base64-encoded-gemini-key>

  # ── News Sources ──────────────────────────────────────────────────────
  NEWS_API_KEY: <base64-encoded-newsapi-key>

  # ── Reddit OAuth2 (Phase 6) ───────────────────────────────────────────
  # Tạo app tại: https://www.reddit.com/prefs/apps → "script" type
  # echo -n "your_client_id" | base64
  REDDIT_CLIENT_ID: <base64-encoded-reddit-client-id>
  REDDIT_CLIENT_SECRET: <base64-encoded-reddit-client-secret>

  # ── Monitoring ────────────────────────────────────────────────────────
  GRAFANA_PASSWORD: <base64-encoded-grafana-password>
