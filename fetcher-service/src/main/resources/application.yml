server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: fetcher-service

  threads:
    virtual:
      enabled: true   # Java 21 Virtual Threads — I/O-heavy workload

  # ── Redis (Rate Limiter + Distributed Lock) ───────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 5
          max-idle: 3
          min-idle: 1

  # ── Kafka — Consumer (news.schedule.trigger) + Producer (news.fetched) ───
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: fetcher-group
      auto-offset-reset: earliest
      enable-auto-commit: false   # Manual ACK — xem KafkaConsumerConfig.java
    producer:
      acks: all
      retries: 3

# ── External API keys ─────────────────────────────────────────────────────
bot:
  news-api:
    key: ${NEWS_API_KEY:}
    base-url: https://newsapi.org/v2

  reddit:
    client-id: ${REDDIT_CLIENT_ID:}
    client-secret: ${REDDIT_CLIENT_SECRET:}
    # User-Agent theo Reddit OAuth2 policy: <app-name>/<version> by /u/<reddit_username>
    user-agent: ${REDDIT_USER_AGENT:journalist-bot/2.0 by /u/journalist_bot_dev}

  # ── Fetch limit (override per-trigger nếu scheduler gửi khác) ───────────
  schedule:
    news-fetch-limit: ${NEWS_FETCH_LIMIT:5}

  # ── Rate Limiting ────────────────────────────────────────────────────────
  rate-limit:
    news-api:
      permits: 90
      period-hours: 24
    reddit:
      permits: 55
      period-seconds: 60
    hn:
      permits: 100
      period-seconds: 60

# ── Resilience4j Circuit Breaker ─────────────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      newsApi:
        failureRateThreshold: 60
        minimumNumberOfCalls: 5
        slidingWindowSize: 10
        waitDurationInOpenState: 120s
        permittedNumberOfCallsInHalfOpenState: 2
        registerHealthIndicator: true
      reddit:
        failureRateThreshold: 60
        minimumNumberOfCalls: 5
        slidingWindowSize: 10
        waitDurationInOpenState: 120s
        permittedNumberOfCallsInHalfOpenState: 2
        registerHealthIndicator: true
      hn:
        failureRateThreshold: 60
        minimumNumberOfCalls: 5
        slidingWindowSize: 10
        waitDurationInOpenState: 120s
        permittedNumberOfCallsInHalfOpenState: 2
        registerHealthIndicator: true

# ── Actuator + Tracing ───────────────────────────────────────────────────
management:
  # Zipkin tracing — Spring Boot 3.x Micrometer style (spring.zipkin.* đã removed)
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_BASE_URL:http://localhost:9411}/api/v2/spans
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

# ── Logging ──────────────────────────────────────────────────────────────
logging:
  level:
    com.maru.journalistbot.fetcher: INFO
    org.springframework.retry: WARN
    org.apache.kafka: WARN
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level [traceId=%X{traceId}] %logger{30} - %msg%n"
