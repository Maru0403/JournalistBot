name: notification-service — CI/CD

on:
  push:
    branches: [ "**" ]
    paths:
      - 'notification-service/**'
      - 'common/**'
      - 'pom.xml'
      - '.github/workflows/ci-cd-notification.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'notification-service/**'
      - 'common/**'
      - 'pom.xml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/journalist-notification
  SERVICE: notification-service

jobs:

  # ── CI: Build + Test ────────────────────────────────────────────────────────
  ci:
    runs-on: ubuntu-latest
    name: CI — Build & Test notification-service

    services:
      # notification-service needs Postgres + MongoDB + Redis
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: "123789"
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongodb:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build notification-service
        run: mvn compile -pl notification-service -am -B -q

      - name: Test notification-service
        run: mvn test -pl notification-service -am -B
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/postgres
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: "123789"
          SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/journalist_bot_test
          SPRING_DATA_REDIS_HOST: localhost
          KAFKA_BOOTSTRAP_SERVERS: "localhost:9092"
          # Bot tokens — empty in CI (bot init is lazy and handles missing tokens gracefully)
          DISCORD_BOT_TOKEN: ""
          TELEGRAM_BOT_TOKEN: ""

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: notification-test-reports
          path: notification-service/target/surefire-reports/
          retention-days: 7

  # ── CD: Docker Build & Push ────────────────────────────────────────────────
  cd:
    runs-on: ubuntu-latest
    name: CD — Docker Build & Push notification-service
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: notification-service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
