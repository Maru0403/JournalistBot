name: fetcher-service — CI/CD

# Trigger only when fetcher-service code or its dependencies change
on:
  push:
    branches: [ "**" ]
    paths:
      - 'fetcher-service/**'
      - 'common/**'
      - 'pom.xml'
      - '.github/workflows/ci-cd-fetcher.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'fetcher-service/**'
      - 'common/**'
      - 'pom.xml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/journalist-fetcher
  SERVICE: fetcher-service

jobs:

  # ── CI: Build + Test ────────────────────────────────────────────────────────
  ci:
    runs-on: ubuntu-latest
    name: CI — Build & Test fetcher-service

    services:
      # fetcher-service needs Postgres (Quartz) + Redis (rate limiter + lock)
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: "123789"
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Build only fetcher-service + common (its dependency)
      # -pl = project list, -am = also make (build dependencies first)
      - name: Build fetcher-service
        run: mvn compile -pl fetcher-service -am -B -q

      - name: Test fetcher-service
        run: mvn test -pl fetcher-service -am -B
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/postgres
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: "123789"
          SPRING_DATA_REDIS_HOST: localhost
          SPRING_QUARTZ_JDBC_INITIALIZE_SCHEMA: always
          # Disable external API calls in tests
          NEWS_API_KEY: ""
          KAFKA_BOOTSTRAP_SERVERS: "localhost:9092"  # test will mock/skip Kafka

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fetcher-test-reports
          path: fetcher-service/target/surefire-reports/
          retention-days: 7

  # ── CD: Docker Build & Push (only on main branch) ──────────────────────────
  cd:
    runs-on: ubuntu-latest
    name: CD — Docker Build & Push fetcher-service
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      # Build Docker image from project root — Dockerfile handles multi-module build
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: fetcher-service/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
