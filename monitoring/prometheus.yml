global:
  scrape_interval: 15s       # Mỗi 15s scrape /actuator/prometheus
  evaluation_interval: 15s
  external_labels:
    env: 'local'
    project: 'journalist-bot'

# ── Scrape configs — mỗi service một job ───────────────────────────────────
scrape_configs:

  - job_name: 'scheduler-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['scheduler-service:8084']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: 'fetcher-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['fetcher-service:8081']

  - job_name: 'summarizer-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['summarizer-service:8082']

  - job_name: 'notification-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['notification-service:8083']

  - job_name: 'gateway-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['gateway-service:8080']

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9101']   # JMX exporter nếu cần
    honor_labels: true
