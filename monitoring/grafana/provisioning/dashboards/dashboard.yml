apiVersion: 1

providers:
  - name: 'journalist-bot'
    orgId: 1
    folder: 'JournalistBot'
    folderUid: journalist-bot
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
