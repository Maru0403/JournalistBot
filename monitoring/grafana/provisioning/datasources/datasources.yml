apiVersion: 1

datasources:
  # ── Prometheus — metrics ─────────────────────────────────────────────────
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      timeInterval: '15s'
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: zipkin

  # ── Loki — logs ──────────────────────────────────────────────────────────
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      derivedFields:
        # Link từ log line có traceId → Zipkin trace
        - matcherRegex: 'traceId=(\w+)'
          name: TraceID
          url: '$${__value.raw}'
          datasourceUid: zipkin

  # ── Zipkin — distributed traces ──────────────────────────────────────────
  - name: Zipkin
    uid: zipkin
    type: zipkin
    access: proxy
    url: http://zipkin:9411
