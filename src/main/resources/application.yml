server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: journalist-bot

  # ======================== DATABASE ========================
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/journalist_bot}

    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:123789}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: journalist_bot
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        hbm2ddl:
          create_namespaces: true
    show-sql: false

  # ======================== THREAD (Project Loom) ========================
  threads:
    virtual:
      enabled: true   # Java 21 Virtual Threads — great for I/O-heavy workloads

# ======================== BOT PLATFORM TOKENS ========================
bot:
  discord:
    token: ${DISCORD_BOT_TOKEN:your-discord-bot-token-here}
    news-channel-id: ${DISCORD_NEWS_CHANNEL_ID:}

  telegram:
    token: ${TELEGRAM_BOT_TOKEN:your-telegram-bot-token-here}
    # Bot username WITHOUT the @ prefix (from @BotFather → /mybots → Edit Bot → Edit Name)
    username: ${TELEGRAM_BOT_USERNAME:YourBotUsername}

  # Zalo OA — disabled in Phase 3, planned for future phase
  # zalo:
  #   app-id: ${ZALO_APP_ID:your-zalo-app-id}
  #   app-secret: ${ZALO_APP_SECRET:your-zalo-app-secret}
  #   oa-token: ${ZALO_OA_ACCESS_TOKEN:your-zalo-oa-access-token}
  #   base-url: https://openapi.zalo.me

  # ======================== EXTERNAL APIS ========================
  news-api:
    key: ${NEWS_API_KEY:your-newsapi-org-key-here}
    base-url: https://newsapi.org/v2

  # ======================== HN ALGOLIA (Phase 1 fix) ========================
  hn:
    base-url: https://hn.algolia.com/api/v1
    # Free, no auth required — 10,000 req/hour
    min-points: 10    # Filter low-quality posts

  # ======================== AI — Phase 2 ========================
  ai:
    # Primary provider: "claude" or "gemini"
    # Strategy: primary → fallback → plain text (never crashes)
    primary-provider: ${AI_PRIMARY_PROVIDER:claude}

    anthropic:
      api-key: ${ANTHROPIC_API_KEY:your-anthropic-api-key-here}
      # Model: claude-haiku-4-5-20251001 — fast & cheap for summarization
      # Get your key: https://console.anthropic.com/settings/keys

    gemini:
      api-key: ${GEMINI_API_KEY:your-gemini-api-key-here}
      # Model: gemini-1.5-flash — free tier: 1,500 req/day, 1M tokens/min
      # Get your key: https://aistudio.google.com/app/apikey

  # ======================== SCHEDULING ========================
  schedule:
    initial-delay-ms: ${INITIAL_DELAY_MS:30000}            # 30s startup grace period
    ai-news-interval-ms: ${AI_NEWS_INTERVAL_MS:1800000}    # 30 minutes
    prog-news-interval-ms: ${PROG_NEWS_INTERVAL_MS:3600000} # 1 hour
    gamedev-news-interval-ms: ${GAMEDEV_NEWS_INTERVAL_MS:7200000} # 2 hours
    news-fetch-limit: 5

  # ======================== DEDUPLICATION ========================
  dedup:
    redis-ttl-hours: 48
    mongo-ttl-days: 7

# ======================== ACTUATOR ========================
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, scheduledtasks
  endpoint:
    health:
      show-details: when-authorized

# ======================== LOGGING ========================
logging:
  level:
    com.maru.journalistbot: INFO
    net.dv8tion.jda: WARN
    org.springframework.retry: WARN
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
