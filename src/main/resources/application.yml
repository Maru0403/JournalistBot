server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: journalist-bot

  # ======================== DATABASE ========================
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/journalist_bot}

    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:123789}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: journalist_bot
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        hbm2ddl:
          create_namespaces: true
    show-sql: false

  # ======================== THREAD (Project Loom) ========================
  threads:
    virtual:
      enabled: true   # Java 21 Virtual Threads — great for I/O-heavy workloads

  # ======================== QUARTZ SCHEDULER ========================
  quartz:
    job-store-type: jdbc          # persist jobs in PostgreSQL (QRTZ_* tables)
    jdbc:
      initialize-schema: always   # auto-create QRTZ_* tables on startup
    properties:
      org.quartz:
        scheduler:
          instanceName: JournalistBotScheduler
          instanceId: AUTO          # unique per pod — important for clustering
        jobStore:
          class: org.springframework.scheduling.quartz.LocalDataSourceJobStore
          driverDelegateClass: org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
          tablePrefix: QRTZ_
          isClustered: true         # enable cluster mode — works with Redis lock
          clusterCheckinInterval: 10000
          useProperties: false
        threadPool:
          threadCount: 5            # 3 news jobs + 2 spare

# ======================== BOT PLATFORM TOKENS ========================
bot:
  discord:
    token: ${DISCORD_BOT_TOKEN:your-discord-bot-token-here}
    news-channel-id: ${DISCORD_NEWS_CHANNEL_ID:}

  telegram:
    token: ${TELEGRAM_BOT_TOKEN:your-telegram-bot-token-here}
    # Bot username WITHOUT the @ prefix (from @BotFather → /mybots → Edit Bot → Edit Name)
    username: ${TELEGRAM_BOT_USERNAME:YourBotUsername}

  # ======================== EXTERNAL APIS ========================
  news-api:
    key: ${NEWS_API_KEY:your-newsapi-org-key-here}
    base-url: https://newsapi.org/v2

  # ======================== HN ALGOLIA (Phase 1 fix) ========================
  hn:
    base-url: https://hn.algolia.com/api/v1
    # Free, no auth required — 10,000 req/hour
    min-points: 10    # Filter low-quality posts

  # ======================== AI — Phase 2 ========================
  ai:
    # Primary provider: "claude" or "gemini"
    # Strategy: primary → fallback → plain text (never crashes)
    primary-provider: ${AI_PRIMARY_PROVIDER:claude}

    anthropic:
      api-key: ${ANTHROPIC_API_KEY:your-anthropic-api-key-here}
      # Model: claude-haiku-4-5-20251001 — fast & cheap for summarization
      # Get your key: https://console.anthropic.com/settings/keys

    gemini:
      api-key: ${GEMINI_API_KEY:your-gemini-api-key-here}
      # Model: gemini-1.5-flash — free tier: 1,500 req/day, 1M tokens/min
      # Get your key: https://aistudio.google.com/app/apikey

  # ======================== SCHEDULING ========================
  schedule:
    initial-delay-ms: ${INITIAL_DELAY_MS:30000}            # 30s startup grace period
    ai-news-interval-ms: ${AI_NEWS_INTERVAL_MS:1800000}    # 30 minutes
    prog-news-interval-ms: ${PROG_NEWS_INTERVAL_MS:3600000} # 1 hour
    gamedev-news-interval-ms: ${GAMEDEV_NEWS_INTERVAL_MS:7200000} # 2 hours
    news-fetch-limit: 5

  # ======================== DEDUPLICATION ========================
  dedup:
    redis-ttl-hours: 48
    mongo-ttl-days: 7

  # ======================== RATE LIMITING ========================
  rate-limit:
    # NewsAPI free tier: 100 req/day = ~4 req/hour
    news-api:
      permits: 90           # leave 10 req buffer
      period-hours: 24
    # Reddit: 60 req/min per OAuth token
    reddit:
      permits: 55           # leave 5 req buffer
      period-seconds: 60
    # HN Algolia: 10,000 req/hour — effectively unlimited for our usage
    hn:
      permits: 100
      period-seconds: 60

# ======================== RESILIENCE4J — Circuit Breaker ========================
resilience4j:
  circuitbreaker:
    instances:
      # AI providers — expensive, fail fast and fallback to next provider
      claude:
        failureRateThreshold: 50
        minimumNumberOfCalls: 5
        slidingWindowSize: 10
        waitDurationInOpenState: 60s
        permittedNumberOfCallsInHalfOpenState: 3
        registerHealthIndicator: true
      gemini:
        failureRateThreshold: 50
        minimumNumberOfCalls: 5
        slidingWindowSize: 10
        waitDurationInOpenState: 60s
        permittedNumberOfCallsInHalfOpenState: 3
        registerHealthIndicator: true
      # News fetchers — return empty list on open, next cycle will retry
      newsApi:
        failureRateThreshold: 60
        minimumNumberOfCalls: 5
        slidingWindowSize: 10
        waitDurationInOpenState: 120s
        permittedNumberOfCallsInHalfOpenState: 2
        registerHealthIndicator: true
      reddit:
        failureRateThreshold: 60
        minimumNumberOfCalls: 5
        slidingWindowSize: 10
        waitDurationInOpenState: 120s
        permittedNumberOfCallsInHalfOpenState: 2
        registerHealthIndicator: true
      hn:
        failureRateThreshold: 60
        minimumNumberOfCalls: 5
        slidingWindowSize: 10
        waitDurationInOpenState: 120s
        permittedNumberOfCallsInHalfOpenState: 2
        registerHealthIndicator: true
      # Platform adapters — skip broadcast on open, subscribers try again next cycle
      discord:
        failureRateThreshold: 50
        minimumNumberOfCalls: 3
        slidingWindowSize: 6
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 2
        registerHealthIndicator: true
      telegram:
        failureRateThreshold: 50
        minimumNumberOfCalls: 3
        slidingWindowSize: 6
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 2
        registerHealthIndicator: true

# ======================== ACTUATOR ========================
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, scheduledtasks, circuitbreakers
  endpoint:
    health:
      show-details: when-authorized
  health:
    circuitbreakers:
      enabled: true

# ======================== LOGGING ========================
logging:
  level:
    com.maru.journalistbot: INFO
    net.dv8tion.jda: WARN
    org.springframework.retry: WARN
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
