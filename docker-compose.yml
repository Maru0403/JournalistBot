services:

  # ─────────────────────────────────────────────────────────────────────────
  # INFRASTRUCTURE
  # ─────────────────────────────────────────────────────────────────────────

  # ─── Kafka (KRaft mode — không cần Zookeeper) ────────────────────────────
  #
  # KRaft mode: Kafka tự quản lý metadata mà không cần Zookeeper (Kafka 3.3+)
  # KAFKA_PROCESS_ROLES: broker,controller → 1 container làm cả 2 vai
  # CLUSTER_ID: phải là base64 UUID cố định — thay đổi sẽ mất data
  #
  # Topics được tạo tự động khi producer gửi message lần đầu (auto.create.topics=true)
  # Để production: tạo topic thủ công với partition/replication factor phù hợp
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: journalist-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"     # External (host machine → Kafka)
      - "9093:9093"     # Controller (internal KRaft communication)
    environment:
      # ── KRaft Identity ──────────────────────────────────────────────────
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"   # base64 UUID — KHÔNG thay đổi sau khi init

      # ── Listeners ───────────────────────────────────────────────────────
      # PLAINTEXT       → các service trong Docker network dùng
      # PLAINTEXT_HOST  → host machine (mvn spring-boot:run local) dùng
      # CONTROLLER      → KRaft internal (chỉ broker-to-controller)
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"

      # ── Topic defaults ───────────────────────────────────────────────────
      KAFKA_NUM_PARTITIONS: 3                  # 3 partition → 3 consumer thread song song
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1      # Single broker local — production dùng 3
      KAFKA_MIN_INSYNC_REPLICAS: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"  # Tự tạo topic khi producer gửi lần đầu
      KAFKA_LOG_RETENTION_HOURS: 24            # Giữ message 24h — đủ để re-consume nếu service down

      # ── Performance ──────────────────────────────────────────────────────
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s    # Kafka KRaft cần ~20s để init lần đầu
    networks:
      - bot-network

  # ─── MongoDB ──────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: journalist-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bot-network

  # ─── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: journalist-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123789"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bot-network

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: journalist-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - bot-network

  # ─────────────────────────────────────────────────────────────────────────
  # MICROSERVICES
  # Build từng service bằng: docker-compose build fetcher-service
  # Run tất cả:              docker-compose up -d
  # Run chỉ infra:           docker-compose up -d kafka mongodb postgres redis
  # ─────────────────────────────────────────────────────────────────────────

  # ─── Fetcher Service ──────────────────────────────────────────────────────
  fetcher-service:
    build:
      context: .
      dockerfile: fetcher-service/Dockerfile
    container_name: journalist-fetcher
    restart: unless-stopped
    ports:
      - "${FETCHER_PORT:-8081}:8081"
    environment:
      SERVER_PORT: 8081
      # Database (Quartz cần PostgreSQL)
      POSTGRES_URL: jdbc:postgresql://postgres:5432/postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123789
      # Redis (Rate Limiter + Distributed Lock)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092   # Internal Docker network port
      # API Keys của fetcher (không có AI keys ở đây)
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      # Scheduler
      INITIAL_DELAY_MS: ${INITIAL_DELAY_MS:-30000}
      AI_NEWS_INTERVAL_MS: ${AI_NEWS_INTERVAL_MS:-1800000}
      PROG_NEWS_INTERVAL_MS: ${PROG_NEWS_INTERVAL_MS:-3600000}
      GAMEDEV_NEWS_INTERVAL_MS: ${GAMEDEV_NEWS_INTERVAL_MS:-7200000}
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bot-network

  # ─── Summarizer Service ───────────────────────────────────────────────────
  summarizer-service:
    build:
      context: .
      dockerfile: summarizer-service/Dockerfile
    container_name: journalist-summarizer
    restart: unless-stopped
    ports:
      - "${SUMMARIZER_PORT:-8082}:8082"
    environment:
      SERVER_PORT: 8082
      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # AI API Keys — chỉ service này có (principle of least privilege)
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AI_PRIMARY_PROVIDER: ${AI_PRIMARY_PROVIDER:-claude}
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - bot-network

  # ─── Notification Service ─────────────────────────────────────────────────
  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: journalist-notification
    restart: unless-stopped
    ports:
      - "${NOTIFICATION_PORT:-8083}:8083"
    environment:
      SERVER_PORT: 8083
      # Database (Subscription + SentArticle dedup)
      MONGODB_URI: mongodb://mongodb:27017/journalist_bot
      POSTGRES_URL: jdbc:postgresql://postgres:5432/postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123789
      # Redis (Distributed Lock + Dedup cache)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Kafka
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      # Internal service URLs (for /news command — REST calls within bot-network)
      FETCHER_SERVICE_URL: http://fetcher-service:8081
      SUMMARIZER_SERVICE_URL: http://summarizer-service:8082
      # Bot tokens — chỉ service này có
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_NEWS_CHANNEL_ID: ${DISCORD_NEWS_CHANNEL_ID:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      fetcher-service:
        condition: service_started   # cần cho /news REST call
      summarizer-service:
        condition: service_started   # cần cho /news REST call
    networks:
      - bot-network

  # ─── Gateway Service ──────────────────────────────────────────────────────
  gateway-service:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    container_name: journalist-gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-8080}:8080"   # Điểm vào duy nhất từ bên ngoài
    environment:
      SERVER_PORT: 8080
      # Service URLs (internal Docker network)
      FETCHER_SERVICE_URL: http://fetcher-service:8081
      SUMMARIZER_SERVICE_URL: http://summarizer-service:8082
      NOTIFICATION_SERVICE_URL: http://notification-service:8083
      # Redis (IP rate limiting)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Security
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
    depends_on:
      redis:
        condition: service_healthy
      fetcher-service:
        condition: service_started
      summarizer-service:
        condition: service_started
      notification-service:
        condition: service_started
    networks:
      - bot-network

volumes:
  kafka_data:
  mongodb_data:
  postgres_data:
  redis_data:

networks:
  bot-network:
    driver: bridge
